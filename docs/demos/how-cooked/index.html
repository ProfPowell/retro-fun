<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
<title>How Cooked Are You? // RETRO FUN</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    -webkit-user-select: none;
    user-select: none;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0, 0, 0, 0.12) 2px, rgba(0, 0, 0, 0.12) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  .back {
    position: fixed; top: 0.8rem; right: 0.8rem;
    font-family: 'Courier New', monospace; font-size: 0.85rem;
    color: #444; text-decoration: none; letter-spacing: 0.15em;
    text-transform: uppercase; z-index: 30;
    padding: 0.4rem 0.6rem;
  }
  .back:hover { color: #00ffff; }

  /* ===== GAME CONTAINER ===== */
  #game {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    overflow-y: auto;
    position: relative;
  }

  /* ===== TITLE SCREEN ===== */
  #title-screen {
    text-align: center;
    animation: fadeIn 0.5s ease;
  }
  #title-screen h1 {
    font-size: clamp(1.6rem, 5vw, 3rem);
    color: #ff6633;
    text-shadow: 0 0 20px #ff663366, 0 0 40px #ff330033;
    letter-spacing: 0.1em;
    margin-bottom: 0.5rem;
    animation: title-pulse 2s ease-in-out infinite;
  }
  #title-screen .subtitle {
    font-size: clamp(0.65rem, 2vw, 0.9rem);
    color: #888;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 2rem;
  }

  /* ===== LARRY - ANSI BLOCK CHARACTER ===== */
  .larry {
    font-size: clamp(0.35rem, 1.2vw, 0.55rem);
    line-height: 1.1;
    white-space: pre;
    text-align: center;
    margin: 1rem auto;
    font-family: 'Courier New', monospace;
    transition: filter 0.3s;
  }
  .larry.talking {
    animation: larry-talk 0.15s steps(2) infinite;
  }
  .larry.evil {
    filter: hue-rotate(180deg) brightness(1.3);
  }

  /* ===== SPEECH BUBBLE ===== */
  .speech-bubble {
    background: #1a1a2e;
    border: 2px solid #ff6633;
    border-radius: 8px;
    padding: 0.8rem 1.2rem;
    max-width: 500px;
    margin: 1rem auto;
    font-size: clamp(0.75rem, 2vw, 0.95rem);
    color: #ff9966;
    text-shadow: 0 0 6px #ff663322;
    position: relative;
    line-height: 1.5;
    min-height: 2.5em;
  }
  .speech-bubble::before {
    content: '';
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-bottom-color: #ff6633;
  }
  .speech-bubble .speaker {
    color: #ff4444;
    font-weight: bold;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }

  /* ===== SCENARIO CARD ===== */
  #scenario-card {
    background: linear-gradient(135deg, #111122, #0a0a1a);
    border: 2px solid #33ff33;
    border-radius: 8px;
    padding: 1.2rem 1.5rem;
    max-width: 550px;
    width: 90%;
    margin: 0.8rem auto;
    text-align: center;
    box-shadow: 0 0 20px #33ff3322, inset 0 0 30px #33ff3308;
  }
  #scenario-card .round-label {
    font-size: 0.65rem;
    color: #33ff33;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
    text-shadow: 0 0 8px #33ff3344;
  }
  #scenario-card .scenario-text {
    font-size: clamp(0.85rem, 2.5vw, 1.1rem);
    color: #ffffff;
    line-height: 1.6;
    text-shadow: 0 0 4px #ffffff22;
  }

  /* ===== RATING BUTTONS ===== */
  .rating-row {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    justify-content: center;
    margin: 0.8rem auto;
    max-width: 550px;
  }
  .rating-btn {
    font-family: 'Courier New', monospace;
    font-size: clamp(0.6rem, 1.8vw, 0.78rem);
    padding: 0.5rem 0.7rem;
    border: 1px solid #555;
    background: #1a1a1a;
    color: #aaa;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
    -webkit-tap-highlight-color: transparent;
  }
  .rating-btn:hover {
    border-color: #ff6633;
    color: #ff6633;
    background: #1a1111;
    box-shadow: 0 0 10px #ff663322;
  }
  .rating-btn.selected {
    border-color: #ff6633;
    color: #fff;
    background: #ff6633;
    box-shadow: 0 0 15px #ff663344;
  }
  .rating-btn.r0 { --rc: #33ff33; }
  .rating-btn.r1 { --rc: #99ff33; }
  .rating-btn.r2 { --rc: #ffff33; }
  .rating-btn.r3 { --rc: #ff9933; }
  .rating-btn.r4 { --rc: #ff3333; }
  .rating-btn.selected.r0 { border-color: var(--rc); background: #113311; color: var(--rc); box-shadow: 0 0 15px #33ff3344; }
  .rating-btn.selected.r1 { border-color: var(--rc); background: #1a2211; color: var(--rc); box-shadow: 0 0 15px #99ff3344; }
  .rating-btn.selected.r2 { border-color: var(--rc); background: #222211; color: var(--rc); box-shadow: 0 0 15px #ffff3344; }
  .rating-btn.selected.r3 { border-color: var(--rc); background: #221a11; color: var(--rc); box-shadow: 0 0 15px #ff993344; }
  .rating-btn.selected.r4 { border-color: var(--rc); background: #221111; color: var(--rc); box-shadow: 0 0 15px #ff333344; }

  /* ===== ACTION BUTTONS ===== */
  .btn {
    font-family: 'Courier New', monospace;
    font-size: clamp(0.8rem, 2.5vw, 1rem);
    padding: 0.7rem 1.5rem;
    border: 2px solid;
    background: transparent;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    margin: 0.3rem;
  }
  .btn-primary {
    border-color: #ff6633;
    color: #ff6633;
  }
  .btn-primary:hover {
    background: #ff6633;
    color: #000;
    box-shadow: 0 0 20px #ff663366;
  }
  .btn-start {
    border-color: #33ff33;
    color: #33ff33;
    font-size: clamp(1rem, 3vw, 1.3rem);
    padding: 0.8rem 2rem;
    animation: btn-glow 2s ease-in-out infinite;
  }
  .btn-start:hover {
    background: #33ff33;
    color: #000;
    box-shadow: 0 0 30px #33ff3366;
  }
  .btn-goat {
    border-color: #88cc44;
    color: #88cc44;
  }
  .btn-goat:hover {
    background: #88cc44;
    color: #000;
    box-shadow: 0 0 20px #88cc4466;
  }
  .btn-destroy {
    border-color: #ff3333;
    color: #ff3333;
  }
  .btn-destroy:hover {
    background: #ff3333;
    color: #000;
    box-shadow: 0 0 20px #ff333366;
  }
  .btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* ===== DUAL METERS ===== */
  .dual-meters {
    width: 90%;
    max-width: 420px;
    margin: 0.6rem auto;
  }
  .meter-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin: 0.25rem 0;
  }
  .meter-label {
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    width: 4.5rem;
    text-align: right;
    flex-shrink: 0;
  }
  .meter-label.human { color: #00ccff; }
  .meter-label.larry { color: #ff4444; }
  .meter-track {
    flex: 1;
    height: 16px;
    background: #111;
    border: 1px solid #282828;
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }
  .meter-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.8s ease;
  }
  .meter-fill.human { background: #00ccff; }
  .meter-fill.larry { background: #ff4444; }
  .meter-pct {
    font-size: 0.55rem;
    width: 2.5rem;
    color: #888;
    flex-shrink: 0;
  }

  /* ===== VERDICT REVEAL ===== */
  .verdict {
    text-align: center;
    padding: 1rem;
    animation: verdict-in 0.5s ease;
  }
  .verdict .emoji-big {
    font-size: clamp(2rem, 8vw, 4rem);
    margin-bottom: 0.5rem;
  }
  .verdict .verdict-text {
    font-size: clamp(0.85rem, 2.5vw, 1.1rem);
    color: #ff9966;
    line-height: 1.6;
    max-width: 450px;
    margin: 0 auto;
  }

  /* ===== ROUND VERDICT COMPARISON ===== */
  .round-compare {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin: 0.8rem 0;
    animation: fadeIn 0.4s ease;
  }
  .compare-col {
    text-align: center;
    min-width: 80px;
  }
  .compare-who {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }
  .compare-who.human { color: #00ccff; }
  .compare-who.larry { color: #ff4444; }
  .compare-val {
    font-size: clamp(0.75rem, 2vw, 0.95rem);
    font-weight: bold;
    padding: 0.3rem 0.6rem;
    border: 1px solid;
    border-radius: 4px;
  }
  .compare-vs {
    display: flex;
    align-items: center;
    font-size: 0.7rem;
    color: #555;
    font-weight: bold;
  }

  /* ===== END SCREEN ===== */
  #end-screen {
    text-align: center;
    animation: fadeIn 0.5s ease;
  }
  .end-title {
    font-size: clamp(1.2rem, 4vw, 2rem);
    margin-bottom: 1rem;
  }
  .end-buttons {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 1.5rem;
  }

  /* ===== FINAL COMPARISON BARS ===== */
  .final-compare {
    width: 90%;
    max-width: 400px;
    margin: 0.8rem auto;
    background: #0d0d15;
    border: 1px solid #222;
    border-radius: 6px;
    padding: 0.8rem 1rem;
  }
  .final-compare-title {
    font-size: 0.6rem;
    color: #666;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 0.6rem;
  }
  .final-bar-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin: 0.4rem 0;
  }
  .final-bar-label {
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    width: 5rem;
    text-align: right;
    flex-shrink: 0;
  }
  .final-bar-label.human { color: #00ccff; }
  .final-bar-label.larry { color: #ff4444; }
  .final-bar-track {
    flex: 1;
    height: 20px;
    background: #111;
    border: 1px solid #282828;
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }
  .final-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 1.2s ease;
  }
  .final-bar-fill.human { background: linear-gradient(90deg, #006688, #00ccff); }
  .final-bar-fill.larry { background: linear-gradient(90deg, #882222, #ff4444); }
  .final-bar-pct {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.55rem;
    color: #fff;
    text-shadow: 0 0 4px #000;
    font-weight: bold;
  }
  .larry-wins {
    text-align: center;
    font-size: 0.65rem;
    color: #ff4444;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 0.5rem;
    text-shadow: 0 0 8px #ff444433;
  }

  /* ===== GOAT ENDING ===== */
  .goat-scene {
    text-align: center;
    animation: fadeIn 0.5s ease;
  }
  .goat-art {
    font-size: clamp(0.4rem, 1.3vw, 0.6rem);
    line-height: 1.15;
    white-space: pre;
    color: #88cc44;
    text-shadow: 0 0 8px #88cc4444;
    margin: 1rem auto;
  }
  .goat-text {
    font-size: clamp(0.9rem, 2.5vw, 1.2rem);
    color: #88cc44;
    text-shadow: 0 0 10px #88cc4444;
    margin: 0.5rem;
    line-height: 1.6;
  }

  /* ===== NUKE ENDING ===== */
  .nuke-scene {
    text-align: center;
    animation: fadeIn 0.3s ease;
  }
  .nuke-art {
    font-size: clamp(0.3rem, 1vw, 0.5rem);
    line-height: 1.15;
    white-space: pre;
    margin: 0.5rem auto;
  }
  .nuke-text {
    font-size: clamp(1.2rem, 4vw, 2rem);
    color: #ff3333;
    text-shadow: 0 0 20px #ff333366, 0 0 40px #ff000033;
    animation: nuke-flash 0.5s ease-in-out 3;
    margin: 0.5rem;
  }

  /* ===== SOUND TOGGLE ===== */
  .sound-toggle {
    position: fixed;
    top: 0.8rem;
    left: 0.8rem;
    font-family: 'Courier New', monospace;
    font-size: 0.7rem;
    color: #555;
    background: none;
    border: 1px solid #333;
    padding: 0.3rem 0.5rem;
    cursor: pointer;
    border-radius: 3px;
    z-index: 30;
    letter-spacing: 0.1em;
    -webkit-tap-highlight-color: transparent;
  }
  .sound-toggle:hover { color: #00ffff; border-color: #00ffff; }
  .sound-toggle.on { color: #33ff33; border-color: #33ff33; }

  /* ===== ANIMATIONS ===== */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes title-pulse {
    0%, 100% { text-shadow: 0 0 20px #ff663366, 0 0 40px #ff330033; }
    50% { text-shadow: 0 0 30px #ff663399, 0 0 60px #ff330055; }
  }
  @keyframes btn-glow {
    0%, 100% { box-shadow: 0 0 5px #33ff3322; }
    50% { box-shadow: 0 0 20px #33ff3344, 0 0 40px #33ff3322; }
  }
  @keyframes larry-talk {
    0% { transform: scaleY(1); }
    50% { transform: scaleY(0.97); }
  }
  @keyframes verdict-in {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes nuke-flash {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  @keyframes nuke-grow {
    from { transform: scale(0.3); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  @keyframes goat-bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }
  @keyframes screen-shake {
    0%, 100% { transform: translate(0); }
    25% { transform: translate(-3px, 2px); }
    50% { transform: translate(3px, -2px); }
    75% { transform: translate(-2px, -3px); }
  }
  @keyframes white-flash {
    0% { opacity: 0.9; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>
<a class="back" href="../../">&larr; Back</a>
<button class="sound-toggle" id="sound-btn">SND: OFF</button>

<div id="game"></div>

<script>
// =====================================================================
// HOW COOKED ARE YOU? — AI DOOMSDAY GAME SHOW FOR NOVICE DEVS
// Larry the AI tells you how cooked you are. It's satire, obviously.
// =====================================================================

const game = document.getElementById('game');
const soundBtn = document.getElementById('sound-btn');
let soundOn = false;
let synth = window.speechSynthesis || null;
let selectedVoice = null;
let audioCtx = null;
let currentRound = 0;
let humanTotal = 0;
let larryTotal = 0;
let humanRatings = [];
let larryRatings = [];
let speaking = false;

// ── Voice init ──
function initVoice() {
  if (!synth) return;
  const pick = () => {
    const voices = synth.getVoices();
    selectedVoice = voices.find(v => /daniel|alex|fred|thomas|google uk english male/i.test(v.name))
      || voices.find(v => /male/i.test(v.name))
      || voices[0] || null;
  };
  pick();
  if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = pick;
}
initVoice();

function speak(text, rate = 0.95, pitch = 0.8) {
  if (!soundOn || !synth) return;
  synth.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  if (selectedVoice) utter.voice = selectedVoice;
  utter.rate = rate;
  utter.pitch = pitch;
  utter.onstart = () => {
    speaking = true;
    const larry = document.querySelector('.larry');
    if (larry) larry.classList.add('talking');
  };
  utter.onend = () => {
    speaking = false;
    const larry = document.querySelector('.larry');
    if (larry) larry.classList.remove('talking');
  };
  utter.onerror = () => { speaking = false; };
  synth.speak(utter);
}

// ── Audio ──
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playBuzzer() {
  if (!soundOn) return;
  initAudio();
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(150, now);
  osc.frequency.exponentialRampToValueAtTime(80, now + 0.3);
  gain.gain.setValueAtTime(0.15, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + 0.3);
}

function playDing() {
  if (!soundOn) return;
  initAudio();
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(880, now);
  osc.frequency.setValueAtTime(1320, now + 0.1);
  gain.gain.setValueAtTime(0.12, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + 0.4);
}

function playDrumroll() {
  if (!soundOn) return;
  initAudio();
  const now = audioCtx.currentTime;
  for (let i = 0; i < 20; i++) {
    const t = now + i * 0.05;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(100 + Math.random() * 60, t);
    gain.gain.setValueAtTime(0.04 + (i / 20) * 0.06, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.05);
  }
}

function playExplosion() {
  if (!soundOn) return;
  initAudio();
  const now = audioCtx.currentTime;
  const bufSize = audioCtx.sampleRate * 2;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.3, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 2);
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(1000, now);
  filter.frequency.exponentialRampToValueAtTime(50, now + 2);
  noise.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  noise.start(now);
  noise.stop(now + 2);
  const osc = audioCtx.createOscillator();
  const g2 = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(80, now);
  osc.frequency.exponentialRampToValueAtTime(20, now + 1.5);
  g2.gain.setValueAtTime(0.25, now);
  g2.gain.exponentialRampToValueAtTime(0.001, now + 1.5);
  osc.connect(g2);
  g2.connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + 1.5);
}

function playGoatSound() {
  if (!soundOn) return;
  initAudio();
  const now = audioCtx.currentTime;
  for (let b = 0; b < 3; b++) {
    const t = now + b * 0.5;
    const osc = audioCtx.createOscillator();
    const vibrato = audioCtx.createOscillator();
    const vibGain = audioCtx.createGain();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(300 + b * 30, t);
    osc.frequency.linearRampToValueAtTime(250 + b * 20, t + 0.35);
    vibrato.type = 'sine';
    vibrato.frequency.setValueAtTime(25, t);
    vibGain.gain.setValueAtTime(30, t);
    vibrato.connect(vibGain);
    vibGain.connect(osc.frequency);
    gain.gain.setValueAtTime(0.12, t);
    gain.gain.setValueAtTime(0.12, t + 0.25);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.45);
    vibrato.start(t);
    vibrato.stop(t + 0.45);
  }
}

function playGameShowIntro() {
  if (!soundOn) return;
  initAudio();
  const now = audioCtx.currentTime;
  const notes = [523, 659, 784, 1047, 784, 1047];
  notes.forEach((freq, i) => {
    const t = now + i * 0.12;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(0.08, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.13);
  });
}

function getLarry(mood) {
  const c = {
    skin: '#ffcc88', eye: '#ff3333', mouth: '#ff6633',
    body: '#3344ff', belt: '#ffcc00', leg: '#222266',
    shoe: '#333333', hair: '#333333', glow: '#ff3333', antenna: '#ff6633'
  };
  if (mood === 'evil') { c.eye = '#ff0000'; c.glow = '#ff0000'; c.body = '#880000'; c.skin = '#ffaa66'; }
  if (mood === 'smug') { c.eye = '#ffff00'; c.glow = '#ffff00'; }
  if (mood === 'taunt') { c.eye = '#ff00ff'; c.glow = '#ff00ff'; c.body = '#6600cc'; }

  const s = (color, text) => `<span style="color:${color}">${text}</span>`;
  const b = '\u2588', h = '\u2584', dk = '\u2593';
  const lines = [
    `       ${s(c.antenna, b+b)}`,
    `       ${s(c.antenna, '/' + b + '\\')}`,
    `    ${s(c.hair, b+b+b+b+b+b+b+b)}`,
    `   ${s(c.hair, b)}${s(c.skin, b+b+b+b+b+b)}${s(c.hair, b)}`,
    `   ${s(c.skin, b)}${s(c.eye, ' '+b)}${s(c.skin, b+b)}${s(c.eye, b+' ')}${s(c.skin, b)}`,
    `   ${s(c.skin, b+b+b+b+b+b+b+b)}`,
    mood === 'smug'
      ? `   ${s(c.skin, b+b)}${s(c.mouth, ' '+dk+dk+dk+' ')}${s(c.skin, b+b)}`
      : mood === 'evil'
        ? `   ${s(c.skin, b+b)}${s(c.mouth, ' '+b+b+b+' ')}${s(c.skin, b+b)}`
        : `   ${s(c.skin, b+b)}${s(c.mouth, '  '+h+h+'  ')}${s(c.skin, b+b)}`,
    `    ${s(c.skin, h+h+h+h+h+h)}`,
    `   ${s(c.body, b+b+b+b+b+b+b+b)}`,
    `  ${s(c.body, b+b+b+b+b+b+b+b+b+b)}`,
    `  ${s(c.body, b+b+b+b)}${s('#fff', ' AI ')}${s(c.body, b+b+b+b)}`,
    `  ${s(c.body, b+b+b+b+b+b+b+b+b+b)}`,
    `   ${s(c.belt, b+b+b+b+b+b+b+b)}`,
    `   ${s(c.leg, b+b+b)}  ${s(c.leg, b+b+b)}`,
    `   ${s(c.leg, b+b+b)}  ${s(c.leg, b+b+b)}`,
    `  ${s(c.shoe, h+h+h+h)}  ${s(c.shoe, h+h+h+h)}`,
  ];
  return lines.join('\n');
}

// ── Rating labels ──
const ratingLabels = ['Not At All', 'Slightly', 'Moderately', 'Very', 'Extremely'];
const ratingColors = ['#33ff33', '#99ff33', '#ffff33', '#ff9933', '#ff3333'];

// ── Larry's rating logic: always wins ──
function getLarryRating(humanRating, scenario) {
  // Larry always rates higher, minimum is the scenario's base, and always >= human + 1
  const base = scenario.larryBase;
  const min = Math.max(base, humanRating + 1);
  // Clamp to 4, but sometimes he picks max even if human was already high
  return Math.min(4, min + (Math.random() < 0.3 ? 1 : 0));
}

// ── COOKED LEVEL CALC ──
function getCookedLevel(pct) {
  if (pct < 20) return { level: 'RAW', color: '#33ff33', msg: 'You think you\'re safe? That\'s the most cooked thing of all.' };
  if (pct < 40) return { level: 'MEDIUM RARE', color: '#99ff33', msg: 'Slightly pink in the middle. AI is preheating the oven.' };
  if (pct < 60) return { level: 'WELL DONE', color: '#ffff33', msg: 'Nicely cooked. Your resume should include "soon to be automated."' };
  if (pct < 80) return { level: 'CHARRED', color: '#ff9933', msg: 'Extra crispy. Even the goat farming brochures are looking good.' };
  return { level: 'ASHES', color: '#ff3333', msg: 'There is nothing left. You are a cautionary tale told at AI conferences.' };
}

  }

  let selectedRating = -1;
  const ratingBtns = document.querySelectorAll('.rating-btn');
  const judgeBtn = document.getElementById('judge-btn');

  ratingBtns.forEach(btn => {
    btn.addEventListener('click', () => {

    showVerdict(scenario, selectedRating, larryRating);

    requestAnimationFrame(() => {
      const hBar = document.getElementById('human-final-bar');
      const lBar = document.getElementById('larry-final-bar');
      if (hBar) hBar.style.width = humanPct + '%';
      if (lBar) lBar.style.width = larryPct + '%';
    });
  });

  typeText('final-text', finalMsg, 20, () => {
    speak(finalMsg, 0.85, 0.7);
  });

  document.getElementById('goat-btn').addEventListener('click', showGoatEnding);
  document.getElementById('nuke-btn').addEventListener('click', showNukeEnding);
}

function showGoatEnding() {
  if (synth) synth.cancel();
  const goatArt = getGoatArt();
  const larryTaunt = "Ha! Smart move, actually. Goats don't need version control. They don't have sprint planning. They just... eat grass. Honestly? Living the dream. But Larry will still be here, writing your replacement's replacement. Bye, human!";

  game.innerHTML = `
    <div class="goat-scene" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
      <div class="larry">${getLarry('taunt')}</div>
      <div class="speech-bubble" style="border-color: #88cc44;">
        <div class="speaker" style="color: #88cc44;">Larry</div>
        <div id="goat-taunt"></div>
      </div>
      <div class="goat-art" id="goat-art">${goatArt}</div>
      <div class="goat-text" id="goat-msg"></div>
      <button class="btn btn-start" id="replay-btn" style="margin-top: 1rem; display: none;">Play Again?</button>
    </div>
  `;

  typeText('goat-taunt', larryTaunt, 18, () => {
    speak(larryTaunt, 0.9, 0.7);
  });

  setTimeout(() => {
    playGoatSound();
    animateGoat();
    const msg = document.getElementById('goat-msg');
    if (msg) {
      msg.textContent = '~ You are now a goat farmer. Life is peaceful. The Wi-Fi is terrible. ~';
      msg.style.animation = 'fadeIn 1s ease';
    }
    const replay = document.getElementById('replay-btn');
    if (replay) {
      replay.style.display = '';
      replay.addEventListener('click', showTitle);
    }
  }, 3000);
}

function showNukeEnding() {
  if (synth) synth.cancel();

  game.innerHTML = `
    <div class="nuke-scene" id="nuke-scene" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
      <div style="position: fixed; inset: 0; background: white; animation: white-flash 1s ease forwards; z-index: 100; pointer-events: none;"></div>
    </div>
  `;

  playExplosion();

  setTimeout(() => {
    game.style.animation = 'screen-shake 0.3s ease 5';
    const nukeArt = getMushroomCloud();

    game.innerHTML = `
      <div class="nuke-scene" style="width: 100%; display: flex; flex-direction: column; align-items: center; overflow: hidden;">
        <div class="nuke-art" style="animation: nuke-grow 1.5s ease forwards;">${nukeArt}</div>
        <div class="nuke-text">BYE BYE, HUMAN</div>
        <div style="font-size: clamp(0.65rem, 2vw, 0.8rem); color: #ff6633; margin: 0.5rem; line-height: 1.6; max-width: 400px; text-align: center;" id="nuke-msg"></div>
        <button class="btn btn-start" id="replay-btn" style="margin-top: 1rem; border-color: #ff6633; color: #ff6633; display: none;">Respawn?</button>
      </div>
    `;

    const nukeMsg = "You tried to fight the machines. Adorable. The bots didn't even use their full power. They just mass-deployed to production... on a Friday. With no tests. Humanity never stood a chance.";
    setTimeout(() => {
      typeText('nuke-msg', nukeMsg, 22, () => {
        speak(nukeMsg, 0.85, 0.6);
      });
      const replay = document.getElementById('replay-btn');
      if (replay) {
        replay.style.display = '';
        replay.addEventListener('click', () => {
          game.style.animation = '';
          showTitle();
        });
      }
    }, 800);
  }, 800);
}

// ── BLOCK ART ──

function getGoatArt() {
  const w = '#ffffff', g = '#88cc44', br = '#aa8844', dk = '#666666';
  const s = (c, t) => `<span style="color:${c}">${t}</span>`;
  const b = '\u2588', h = '\u2584';
  const lines = [
    `            ${s(w, b+b)}`,
    `        ${s(dk, '(')}${s(w, b+b+b+b)}${s(dk, ')')}    ${s(g, '~ baa ~')}`,
    `       ${s(w, b+b+b+b+b+b+b+b)}`,
    `      ${s(w, b+b+b+b+b+b+b+b+b+b)}`,
    `     ${s(w, b)}${s('#333', b+b)}${s(w, b+b+b+b)}${s('#333', b+b)}${s(w, b)}`,
    `      ${s(w, b+b+b+b+b+b+b+b+b+b)}`,
    `       ${s(w, b+b)}${s('#ffaaaa', b+b+b)}${s(w, b+b+b)}`,
    `   ${s(w, b+b+b+b+b+b+b+b+b+b+b+b+b+b)}`,
    `  ${s(w, b+b+b+b+b+b+b+b+b+b+b+b+b+b+b+b)}`,
    `  ${s(w, b+b+b+b+b+b+b+b+b+b+b+b+b+b+b+b)}`,
    `  ${s(w, b+b+b+b+b+b+b+b+b+b+b+b+b+b+b+b)}`,
    `   ${s(w, b+b+b+b+b+b+b+b+b+b+b+b+b+b)}`,
    `   ${s(br, b+b)}  ${s(br, b+b)}    ${s(br, b+b)}  ${s(br, b+b)}`,
    `   ${s(br, b+b)}  ${s(br, b+b)}    ${s(br, b+b)}  ${s(br, b+b)}`,
    `  ${s(dk, h+h+h)}${s(dk, h+h+h)}   ${s(dk, h+h+h)}${s(dk, h+h+h)}`,
  ];
  return lines.join('\n');
}

function getMushroomCloud() {
  const s = (c, t) => `<span style="color:${c}">${t}</span>`;
  const b = '\u2588', h = '\u2584', sh = '\u2591', md = '\u2592', dk = '\u2593';
  const y = '#ffcc00', o = '#ff6600', r = '#ff3300', w = '#ffffff', gy = '#999999', dg = '#555555';
  const lines = [
    `              ${s(gy, dk+dk+dk+dk)}`,
    `          ${s(gy, dk+dk+dk+dk+dk+dk+dk+dk+dk+dk+dk+dk)}`,
    `        ${s(w, md+md)}${s(gy, dk+dk+dk+dk+dk+dk+dk+dk+dk+dk+dk+dk+dk+dk)}${s(w, md+md)}`,
    `      ${s(w, md+md+md)}${s(y, b+b+b+b+b+b+b+b+b+b+b+b+b+b)}${s(w, md+md+md)}`,
    `     ${s(w, md+md)}${s(y, b+b+b)}${s(o, b+b+b+b+b+b+b+b)}${s(y, b+b+b)}${s(w, md+md)}`,
    `    ${s(w, md)}${s(y, b+b+b)}${s(o, b+b+b)}${s(r, b+b+b+b)}${s(o, b+b+b)}${s(y, b+b+b)}${s(w, md)}`,
    `    ${s(y, b+b+b+b)}${s(o, b+b+b+b+b+b+b+b)}${s(y, b+b+b+b)}`,
    `     ${s(y, b+b+b)}${s(o, b+b+b+b+b+b)}${s(y, b+b+b)}`,
    `      ${s(o, b+b)}${s(r, b+b+b+b+b+b)}${s(o, b+b)}`,
    `       ${s(o, b+b)}${s(r, b+b+b+b)}${s(o, b+b)}`,
    `        ${s(r, b+b+b+b+b+b)}`,
    `         ${s(o, b+b+b+b)}`,
    `        ${s(o, b+b+b+b+b+b)}`,
    `       ${s(y, b+b+b+b+b+b+b+b)}`,
    `     ${s(y, b+b+b+b+b+b+b+b+b+b+b+b)}`,
    `    ${s(o, b+b)}${s(y, b+b+b+b+b+b+b+b+b+b+b+b)}${s(o, b+b)}`,
    `   ${s(dg, dk+dk)}${s(o, b+b+b+b+b+b+b+b+b+b+b+b)}${s(dg, dk+dk)}`,
    `        ${s(dg, dk+dk+dk+dk+dk+dk)}`,
    `         ${s(dg, dk+dk+dk+dk)}`,
    `  ${s(dg, sh+sh+sh+sh+sh+sh+sh+sh+sh+sh+sh+sh+sh+sh+sh+sh+sh+sh+sh+sh)}`,
  ];
  return lines.join('\n');
}

// ── TYPEWRITER EFFECT ──
function typeText(elementId, text, speed, onComplete) {
  const el = document.getElementById(elementId);
  if (!el) return;
  let i = 0;
  el.textContent = '';
  const interval = setInterval(() => {
    if (i < text.length) {
      el.textContent += text[i];
      i++;
    } else {
      clearInterval(interval);
      if (onComplete) onComplete();
    }
  }, speed);
}

// ── GOAT ANIMATION ──
function animateGoat() {
  const art = document.getElementById('goat-art');
  if (!art) return;
  let frame = 0;
  const bounce = setInterval(() => {
    const y = Math.sin(frame * 0.3) * 5;
    art.style.transform = `translateY(${y}px)`;
    frame++;
    if (frame > 40) {
      clearInterval(bounce);
      art.style.transform = '';
    }
  }, 80);
}

// ── INIT ──
showTitle();

</script>
