<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Agentic Chaos // RETRO FUN</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow: hidden; background: #0a0a0f; height: 100%; }
  canvas { display: block; }
  .back {
    position: fixed; top: 0.5rem; right: 0.8rem;
    font-family: 'Courier New', monospace; font-size: 0.6rem;

  #controls {

    padding: 0.6rem; background: rgba(5,5,10,0.9);
    border-top: 1px solid #1a1a1a; z-index: 10;
  }
  #controls.visible { display: flex; }
  .ctrl-btn {
    background: #111; border: 1px solid #333; color: #aaa;
    font-family: 'Courier New', monospace; font-size: 0.6rem;
    padding: 0.5rem 0.7rem; cursor: pointer;
    letter-spacing: 0.05em; text-transform: uppercase;
    position: relative; overflow: hidden; transition: all 0.15s;
    min-width: 90px; text-align: center;

    <div class="cd-fill" id="cdTests"></div>

  <button class="ctrl-btn" id="btnSpecs" disabled>
    <div class="cd-fill" id="cdSpecs"></div>
    <span>Write Specs</span>
  </button>

    <div class="cd-fill" id="cdReview"></div>
    <span>Code Review</span>

<script>
// =====================================================
// AGENTIC CHAOS
// Wrangle rogue AI agents. Ship releases. Survive.
// =====================================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const controls = document.getElementById('controls');
let W, H, hudH, gameTop, gameBottom, ctrlH, S;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  // Responsive scale factor (same approach as Div Vaders)
  const minDim = Math.min(W, H);
  S = Math.min(2.5, Math.max(1, 580 / minDim));
  hudH = Math.round(56 * S);
  ctrlH = controls.classList.contains('visible') ? controls.offsetHeight : 0;
  gameTop = hudH + 4;
  gameBottom = H - ctrlH - 4;
}
window.addEventListener('resize', resize);
resize();

// =====================================================
// AUDIO
// =====================================================
let audioCtx;
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playTone(freq, dur, vol, type) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type || 'square';
  o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
function playNoise(dur, vol) {
  if (!audioCtx) return;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
  const s = audioCtx.createBufferSource(); s.buffer = buf;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  const f = audioCtx.createBiquadFilter();
  f.type = 'bandpass'; f.frequency.value = 4000; f.Q.value = 1;
  s.connect(f); f.connect(g); g.connect(audioCtx.destination);
  s.start(); s.stop(audioCtx.currentTime + dur);
}
function sfxKill() { playTone(600, 0.06, 0.15, 'square'); playNoise(0.08, 0.12); setTimeout(() => playTone(900, 0.05, 0.08, 'square'), 40); }
function sfxRogue() { playTone(200, 0.2, 0.1, 'sawtooth'); setTimeout(() => playTone(150, 0.2, 0.1, 'sawtooth'), 100); }
function sfxWarn() { playTone(440, 0.08, 0.06, 'triangle'); }
function sfxRelease() { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f, 0.15, 0.08, 'triangle'), i * 80)); }
function sfxGameOver() { [400, 300, 200, 100].forEach((f, i) => setTimeout(() => playTone(f, 0.3, 0.12, 'sawtooth'), i * 150)); }
function sfxButton() { playTone(880, 0.04, 0.06, 'triangle'); }
function sfxGoodAction() { playTone(660 + Math.random() * 200, 0.06, 0.03, 'sine'); }

// =====================================================
// AGENT DATA
// =====================================================
const ROSTER = [
  { name: 'Yoda', color: '#5a5' },
  { name: 'C-3PO', color: '#cc0' },
  { name: 'Vader', color: '#c44' },
  { name: 'Porkins', color: '#c80' },
  { name: 'R2-D2', color: '#48c' },
  { name: 'Fred', color: '#f80' },
  { name: 'Velma', color: '#f60' },
  { name: 'Shaggy', color: '#8c4' },
  { name: 'Scooby', color: '#a64' },
  { name: 'Gandalf', color: '#999' },
  { name: 'Frodo', color: '#68c' },
  { name: 'Sam', color: '#8a4' },
  { name: 'Legolas', color: '#4c8' },
  { name: 'Gimli', color: '#c84' },
  { name: 'Pickle Rick', color: '#4c4' },
  { name: 'Meeseeks', color: '#48f' },
  { name: 'Wiggum', color: '#88f' },
  { name: 'Daphne', color: '#c4c' },
];

const GOOD_ACTIONS = [
  'Adding feature', 'Refactoring', 'Fixing bug', 'Writing docs',
  'Optimizing query', 'Adding types', 'Updating deps', 'Writing test',
  'Code review', 'Improving a11y', 'Fixing lint', 'Adding endpoint',
  'Caching results', 'Splitting bundle', 'Adding logs', 'Fixing flaky test',
  'Adding CI step', 'Reducing bundle', 'Cleaning imports', 'Adding metrics',
];

const ROGUE_ACTIONS = [
  'DELETING main.js', 'rm -rf /', 'Dropping database',
  'Pushing to prod!', 'Removing all tests', 'Adding 10k deps',
  'Rewriting in Rust', 'Deploy on Friday', 'Deleting .env',
  'Force push main', 'npm audit fix --force', 'Converting to PHP',
  'Adding blockchain', 'Removing auth', 'Committing secrets',
  'Disabling CI', 'Deleting backups', 'Reverting 6 months',
  'Adding jQuery', 'Killing error handler', 'Mass reformatting',
  'Downgrading Node', 'Leaking API keys', 'Nuking migrations',
];

const CODE_LINES = [
  'import { Agent } from "@agentic/core";',
  'import { Pipeline } from "./pipeline";',
  'import { Monitor } from "./telemetry";',
  '',
  'const config = {',
  '  maxAgents: 16,',
  '  rogueThreshold: 0.15,',
  '  deployTarget: "production",',

  '  const issues = repo.scan();',
  '  const debt = issues.reduce((sum, i) => {',
  '    return sum + i.severity * i.age;',

  '      return null;',

  '    this.agents.push(a);',
  '    return a;',

  '',
  '  killRogue(id) {',
  '    const idx = this.agents.findIndex(',
  '      a => a.id === id && a.rogue',
  '    );',
  '    if (idx >= 0) this.agents.splice(idx, 1);',
  '  }',
  '}',
  '',
  '// TODO: fix that flaky test',
  '// FIXME: works but nobody knows why',
  '// HACK: do not touch this line',
  '// NOTE: Gandalf approved this',
  '// TODO: Yoda says refactor we must',
  '// FIXME: Porkins can\'t hold it',
  '',
  'async function shipRelease(pipeline, pool) {',
  '  const alive = pool.agents.filter(',
  '    a => !a.rogue',
  '  );',
  '  if (alive.length < 3) {',
  '    throw new Error("Not enough agents");',
  '  }',
  '  await pipeline.run();',
  '  version.minor++;',
  '  console.log(`Shipped v${version}`);',
  '}',
  '',
  'module.exports = { orchestrate, shipRelease };',
];

// =====================================================
// GAME STATE
// =====================================================
let state = 'title'; // title | playing | releasing | gameover
let stability = 100;
let techDebt = 0;
let releaseProgress = 0;
let version = [0, 1, 0]; // major, minor, patch
let level = 1;
let agents = [];
let particles = [];
let floats = [];
let score = 0;
let roguesKilled = 0;
let releasesShipped = 0;
let spawnTimer = 0;
let releaseTimer = 0;
let shakeMag = 0;
let slowTimer = 0; // unit tests slow effect
let freezeTimer = 0; // review freeze effect
let highlightTimer = 0; // review highlight
let codeScroll = 0;
let titleBlink = 0;

// Cooldowns (seconds remaining)
let cdTests = 0, cdSpecs = 0, cdReview = 0;
const CD_TESTS = 22, CD_SPECS = 18, CD_REVIEW = 30;

// =====================================================
// LEVEL PARAMS
// =====================================================
function getLevelParams() {
  return {
    maxAgents: Math.min(35, 8 + Math.floor(level * 1.5)),
    agentSpeed: 65 + level * 5,
    rogueChance: 0.35 + level * 0.06,       // per-second chance (high!)
    rogueTimeout: Math.max(1.5, 3.5 - level * 0.12),
    unstableTime: Math.max(0.3, 0.8 - level * 0.03),
    spawnInterval: Math.max(0.4, 1.4 - level * 0.08),
    actionsForRelease: Math.min(18, 6 + Math.floor(level * 0.5)),
    passiveDebtRate: 2 + level * 0.8,       // debt/sec from idle rogues
  };
}

// =====================================================
// AGENT SYSTEM
// =====================================================
function spawnAgent() {
  const p = getLevelParams();
  if (agents.length >= p.maxAgents) return;
  const roster = ROSTER[Math.floor(Math.random() * ROSTER.length)];
  const side = Math.floor(Math.random() * 4);
  let x, y;
  const margin = 30;
  if (side === 0) { x = margin + Math.random() * (W - margin * 2); y = gameTop + 10; }
  else if (side === 1) { x = margin + Math.random() * (W - margin * 2); y = gameBottom - 20; }
  else if (side === 2) { x = margin; y = gameTop + 20 + Math.random() * (gameBottom - gameTop - 40); }
  else { x = W - margin; y = gameTop + 20 + Math.random() * (gameBottom - gameTop - 40); }

  agents.push({
    x, y,
    tx: margin + Math.random() * (W - margin * 2),
    ty: gameTop + 20 + Math.random() * (gameBottom - gameTop - 50),
    name: roster.name,
    color: roster.color,
    state: 'idle', // idle, working, unstable, rogue, dying
    action: '',
    actionTimer: 0,
    rogueTimer: 0,
    unstableTimer: 0,
    deathTimer: 0,
    walkFrame: Math.random() * 100,
    speed: p.agentSpeed * (0.8 + Math.random() * 0.4),
  });
}

function pickNewTarget(a) {
  const margin = 40;
  a.tx = margin + Math.random() * (W - margin * 2);
  a.ty = gameTop + 25 + Math.random() * (gameBottom - gameTop - 60);
}

function updateAgents(dt) {
  const p = getLevelParams();
  const speedMult = slowTimer > 0 ? 0.4 : 1;
  const frozen = freezeTimer > 0;

  for (let i = agents.length - 1; i >= 0; i--) {
    const a = agents[i];

    if (a.state === 'dying') {
      a.deathTimer -= dt;
      if (a.deathTimer <= 0) { agents.splice(i, 1); }
      continue;
    }

    if (frozen && a.state !== 'rogue') continue;

    // Movement
    if (a.state === 'idle') {
      const dx = a.tx - a.x, dy = a.ty - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 3) {
        a.state = 'working';
        a.action = GOOD_ACTIONS[Math.floor(Math.random() * GOOD_ACTIONS.length)];
        a.actionTimer = 1 + Math.random() * 1.5;
      } else {
        const spd = a.speed * speedMult * dt;
        a.x += (dx / dist) * spd;
        a.y += (dy / dist) * spd;
        a.walkFrame += dt * 8;
      }
      // Can go rogue even while walking
      if (Math.random() < p.rogueChance * dt * 0.5) {
        a.state = 'unstable';
        a.unstableTimer = p.unstableTime;
        sfxWarn();
      }
    }

    // Working
    if (a.state === 'working') {
      a.actionTimer -= dt;
      if (a.actionTimer <= 0) {
        // Good action complete
        releaseProgress += 1;
        score += 10;
        sfxGoodAction();
        addFloat(a.x, a.y - 20, '+' + a.action.split(' ')[0], '#4f4');
        a.state = 'idle';
        a.action = '';
        pickNewTarget(a);
      }
      // Chance to go unstable
      if (Math.random() < p.rogueChance * dt) {
        a.state = 'unstable';
        a.unstableTimer = p.unstableTime;
        sfxWarn();
      }
    }

    // Unstable (warning before rogue)
    if (a.state === 'unstable') {
      a.unstableTimer -= dt;
      if (a.unstableTimer <= 0) {
        a.state = 'rogue';
        a.action = ROGUE_ACTIONS[Math.floor(Math.random() * ROGUE_ACTIONS.length)];
        a.rogueTimer = p.rogueTimeout;
        sfxRogue();
      }
    }

    // Rogue
    if (a.state === 'rogue') {
      a.rogueTimer -= dt;
      a.walkFrame += dt * 15;
      // Rogue agents jitter
      a.x += (Math.random() - 0.5) * 4;
      a.y += (Math.random() - 0.5) * 4;
      a.x = Math.max(20, Math.min(W - 20, a.x));
      a.y = Math.max(gameTop + 10, Math.min(gameBottom - 10, a.y));

      // Continuous tech debt bleed while rogue
      techDebt = Math.min(100, techDebt + p.passiveDebtRate * dt);
      // Continuous stability drain
      stability = Math.max(0, stability - (1.5 + level * 0.3) * dt);

      if (a.rogueTimer <= 0) {
        // Big burst damage on timeout
        const dmg = 18 + Math.floor(level * 1.5);
        stability = Math.max(0, stability - dmg);
        techDebt = Math.min(100, techDebt + 12 + Math.floor(level * 1));
        shakeMag = 15;
        addFloat(a.x, a.y - 20, '-' + dmg + ' STABILITY', '#f44');
        addFloat(a.x, a.y - 8, a.action, '#f88');
        // Agent dies/despawns after damage
        a.state = 'dying';
        a.deathTimer = 0.3;
        spawnParticles(a.x, a.y, '#f44', 12);
      }
    }
  }
}

function killAgent(a) {
  a.state = 'dying';
  a.deathTimer = 0.3;
  roguesKilled++;
  score += 50 + level * 10;
  const bonus = a.rogueTimer > 3 ? ' QUICK!' : '';
  addFloat(a.x, a.y - 20, '+' + (50 + level * 10) + bonus, '#ff0');
  spawnParticles(a.x, a.y, a.color, 12);
  sfxKill();
  // Small stability recovery for catching rogues early
  if (a.rogueTimer > 3) stability = Math.min(100, stability + 2);
}

// =====================================================
// PARTICLES & FLOATS
// =====================================================
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 40 + Math.random() * 80;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 30,
      life: 0.4 + Math.random() * 0.3,
      color,
      size: (3 + Math.random() * 4) * S,
    });
  }
}

function addFloat(x, y, text, color) {
  floats.push({ x, y, text, color, life: 1.5 });
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 120 * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = floats.length - 1; i >= 0; i--) {
    const f = floats[i];
    f.y -= 25 * dt;
    f.life -= dt;
    if (f.life <= 0) floats.splice(i, 1);
  }
}

// =====================================================
// BUTTONS
// =====================================================
const btnTests = document.getElementById('btnTests');
const btnSpecs = document.getElementById('btnSpecs');
const btnReview = document.getElementById('btnReview');

btnTests.addEventListener('click', () => {
  if (cdTests > 0 || state !== 'playing') return;
  sfxButton();
  cdTests = CD_TESTS;
  slowTimer = 8;
  stability = Math.min(100, stability + 8);
  techDebt = Math.max(0, techDebt - 5);
  addFloat(W / 2, gameTop + 40, 'TESTS RUNNING - agents slowed!', '#0ff');
});

btnSpecs.addEventListener('click', () => {
  if (cdSpecs > 0 || state !== 'playing') return;
  sfxButton();
  cdSpecs = CD_SPECS;
  stability = Math.min(100, stability + 5);
  techDebt = Math.max(0, techDebt - 12);
  addFloat(W / 2, gameTop + 40, 'SPECS WRITTEN - tech debt reduced!', '#0ff');
});

btnReview.addEventListener('click', () => {
  if (cdReview > 0 || state !== 'playing') return;
  sfxButton();
  cdReview = CD_REVIEW;
  freezeTimer = 2.5;
  highlightTimer = 5;
  addFloat(W / 2, gameTop + 40, 'CODE REVIEW - agents frozen!', '#0ff');
});

function updateCooldowns(dt) {
  if (cdTests > 0) cdTests = Math.max(0, cdTests - dt);
  if (cdSpecs > 0) cdSpecs = Math.max(0, cdSpecs - dt);
  if (cdReview > 0) cdReview = Math.max(0, cdReview - dt);
  if (slowTimer > 0) slowTimer = Math.max(0, slowTimer - dt);
  if (freezeTimer > 0) freezeTimer = Math.max(0, freezeTimer - dt);
  if (highlightTimer > 0) highlightTimer = Math.max(0, highlightTimer - dt);

  btnTests.disabled = cdTests > 0;
  btnSpecs.disabled = cdSpecs > 0;
  btnReview.disabled = cdReview > 0;

  document.getElementById('cdTests').style.transform = `scaleY(${cdTests / CD_TESTS})`;
  document.getElementById('cdSpecs').style.transform = `scaleY(${cdSpecs / CD_SPECS})`;
  document.getElementById('cdReview').style.transform = `scaleY(${cdReview / CD_REVIEW})`;
}

// =====================================================
// RELEASE SYSTEM
// =====================================================
function checkRelease() {
  const p = getLevelParams();
  if (releaseProgress >= p.actionsForRelease) {
    doRelease();
  }
}

function doRelease() {
  state = 'releasing';
  releaseTimer = 2.5;
  releasesShipped++;
  releaseProgress = 0;
  level++;
  sfxRelease();

  // Version bump
  version[1]++;
  if (version[1] >= 10) {
    version[0]++;
    version[1] = 0;
  }

  // Kill all current rogues as bonus
  for (const a of agents) {
    if (a.state === 'rogue' || a.state === 'unstable') {
      spawnParticles(a.x, a.y, '#0f0', 6);
      a.state = 'dying';
      a.deathTimer = 0.3;
    }
  }

  // Small stability recovery
  stability = Math.min(100, stability + 5);
  techDebt = Math.max(0, techDebt - 3);
}

// =====================================================
// INPUT
// =====================================================
function handleClick(cx, cy) {
  if (state === 'title') {
    initAudio();
    startGame();
    return;
  }
  if (state === 'gameover') {
    startGame();
    return;
  }
  if (state !== 'playing') return;

  // Check for rogue/unstable agent clicks
  let killed = false;
  for (const a of agents) {
    if (a.state !== 'rogue' && a.state !== 'unstable') continue;
    const dx = cx - a.x, dy = cy - a.y;
    if (Math.abs(dx) < 28 * S && Math.abs(dy) < 34 * S) {
      killAgent(a);
      killed = true;
      break;
    }
  }
  if (!killed) {
    // Missed click penalty (small)
    addFloat(cx, cy, 'miss', '#444');
  }
}

canvas.addEventListener('click', (e) => {
  handleClick(e.clientX, e.clientY);
});
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  handleClick(t.clientX, t.clientY);
}, { passive: false });

// =====================================================
// GAME FLOW
// =====================================================
function startGame() {
  state = 'playing';
  stability = 100;
  techDebt = 0;
  releaseProgress = 0;
  version = [0, 1, 0];
  level = 1;
  agents = [];
  particles = [];
  floats = [];
  score = 0;
  roguesKilled = 0;
  releasesShipped = 0;
  spawnTimer = 0;
  slowTimer = 0;
  freezeTimer = 0;
  highlightTimer = 0;
  cdTests = 0; cdSpecs = 0; cdReview = 0;
  shakeMag = 0;
  controls.classList.add('visible');
  resize();
  // Spawn initial agents
  for (let i = 0; i < 8; i++) spawnAgent();
}

// =====================================================
// DRAWING
// =====================================================
function getCodeLineColor(line) {
  if (line.startsWith('//') || line.startsWith('  //')) return '#3a6a3a';
  if (line.includes('import ') || line.includes('module.')) return '#6a8fcc';
  if (line.includes('function ') || line.includes('async ')) return '#cc8844';
  if (line.includes('class ')) return '#ccaa44';
  if (line.includes('const ') || line.includes('let ') || line.includes('var ')) return '#5599bb';
  if (line.includes('if ') || line.includes('for ') || line.includes('return') || line.includes('throw')) return '#bb6688';
  if (line.includes('console.') || line.includes('await ')) return '#7788aa';
  if (line.includes('{') || line.includes('}') || line.includes('(') || line.includes(')')) return '#445566';
  if (line.trim() === '') return '#222';
  return '#4a5568';
}

function drawCodeBg() {
  ctx.fillStyle = '#08080e';
  ctx.fillRect(0, 0, W, H);

  const fontSize = Math.round(12 * S);
  ctx.font = fontSize + 'px "Courier New", monospace';
  const lineH = Math.round(18 * S);
  const startLine = Math.floor(codeScroll / lineH);
  const offsetY = -(codeScroll % lineH);
  const visible = Math.ceil((gameBottom - gameTop) / lineH) + 2;
  const gutterW = Math.round(32 * S);

  for (let i = 0; i < visible; i++) {
    const li = (startLine + i) % CODE_LINES.length;
    const y = gameTop + offsetY + i * lineH + Math.round(14 * S);
    if (y < gameTop - 5 || y > gameBottom + 5) continue;

    // Line number
    ctx.fillStyle = '#334';
    ctx.textAlign = 'right';
    ctx.fillText(String((startLine + i + 1) % 100).padStart(2, ' '), gutterW - 4, y);

    // Code text with syntax color
    const line = CODE_LINES[li];
    ctx.textAlign = 'left';
    ctx.fillStyle = getCodeLineColor(line);
    ctx.fillText(line, gutterW + 6, y);
  }

  // Left gutter line
  ctx.fillStyle = '#1a2030';
  ctx.fillRect(gutterW, gameTop, 1, gameBottom - gameTop);
}

function drawAgent(a) {
  const x = Math.round(a.x), y = Math.round(a.y);
  const t = performance.now() / 1000;

  // Rogue glow
  if (a.state === 'rogue') {
    ctx.fillStyle = `rgba(255,0,0,${0.15 + Math.sin(t * 12) * 0.08})`;
    ctx.beginPath();
    ctx.arc(x, y, 35 * S, 0, Math.PI * 2);
    ctx.fill();
  }

  // Highlight from review
  if (highlightTimer > 0 && (a.state === 'rogue' || a.state === 'unstable')) {
    ctx.strokeStyle = '#ff0';
    ctx.lineWidth = 2 * S;
    ctx.strokeRect(x - 18 * S, y - 22 * S, 36 * S, 48 * S);
  }

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(x - 9 * S, y + 12 * S, 18 * S, 4 * S);

  let bodyColor = a.color;
  if (a.state === 'unstable') {
    bodyColor = Math.sin(t * 10) > 0 ? '#ff0' : a.color;
  } else if (a.state === 'rogue') {
    bodyColor = Math.sin(t * 14) > 0 ? '#f00' : '#800';
  } else if (a.state === 'dying') {
    bodyColor = '#fff';
  }

  // Body
  ctx.fillStyle = bodyColor;
  ctx.fillRect(x - 8 * S, y - 4 * S, 16 * S, 16 * S);

  // Head
  ctx.fillRect(x - 7 * S, y - 15 * S, 14 * S, 12 * S);

  // Eyes
  ctx.fillStyle = a.state === 'rogue' ? '#ff0' : '#fff';
  ctx.fillRect(x - 4 * S, y - 11 * S, 3 * S, 3 * S);
  ctx.fillRect(x + 1 * S, y - 11 * S, 3 * S, 3 * S);
  ctx.fillStyle = '#000';
  ctx.fillRect(x - 3 * S, y - 10 * S, 2 * S, 2 * S);
  ctx.fillRect(x + 2 * S, y - 10 * S, 2 * S, 2 * S);

  // Legs
  const legAnim = a.state === 'idle' ? Math.sin(a.walkFrame) * 4 * S : 0;
  ctx.fillStyle = bodyColor;
  ctx.fillRect(x - 5 * S, y + 12 * S, 4 * S, (7 + legAnim) * S);
  ctx.fillRect(x + 1 * S, y + 12 * S, 4 * S, (7 - legAnim) * S);

  // Name
  ctx.font = Math.round(10 * S) + 'px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = a.state === 'rogue' ? '#f44' : '#778';
  ctx.fillText(a.name, x, y + 30 * S);

  // Action label
  if (a.action && (a.state === 'working' || a.state === 'rogue')) {
    ctx.font = Math.round(9 * S) + 'px "Courier New", monospace';
    if (a.state === 'rogue') {
      ctx.fillStyle = '#f44';
      ctx.fillText('!! ' + a.action + ' !!', x, y - 20 * S);
    } else {
      ctx.fillStyle = '#3a5';
      ctx.fillText(a.action, x, y - 20 * S);
    }
  }

  // Unstable warning
  if (a.state === 'unstable') {
    ctx.font = 'bold ' + Math.round(14 * S) + 'px "Courier New", monospace';
    ctx.fillStyle = '#ff0';
    ctx.fillText('\u26a0', x, y - 20 * S);
  }

  // Rogue timer bar
  if (a.state === 'rogue') {
    const p = getLevelParams();
    const pct = a.rogueTimer / p.rogueTimeout;
    const bw = 28 * S;
    ctx.fillStyle = '#400';
    ctx.fillRect(x - bw / 2, y - 25 * S, bw, 4 * S);
    ctx.fillStyle = pct > 0.3 ? '#f80' : '#f00';
    ctx.fillRect(x - bw / 2, y - 25 * S, bw * pct, 4 * S);
  }
}

function drawHUD() {
  // Background bar
  ctx.fillStyle = 'rgba(5,5,10,0.9)';
  ctx.fillRect(0, 0, W, hudH);
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, hudH, W, 1);

  const pad = 12;
  const barW = Math.min(140, (W - 40) / 4);
  const barH = Math.round(10 * S);
  const labelSize = Math.round(9 * S);
  const valSize = Math.round(9 * S);
  const versionSize = Math.round(14 * S);
  const scoreSize = Math.round(9 * S);
  let cx = pad;
  const row1 = Math.round(16 * S);
  const row2 = row1 + Math.round(4 * S);
  const row3 = row2 + barH + Math.round(4 * S);

  // Stability
  ctx.font = labelSize + 'px "Courier New", monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#888';
  ctx.fillText('STABILITY', cx, row1);
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(cx, row2, barW, barH);
  const stabColor = stability > 50 ? '#0c0' : stability > 25 ? '#cc0' : '#f00';
  ctx.fillStyle = stabColor;
  ctx.fillRect(cx, row2, barW * (stability / 100), barH);
  ctx.fillStyle = '#888';
  ctx.font = valSize + 'px "Courier New", monospace';
  ctx.fillText(stability + '%', cx, row3 + valSize);

  // Tech Debt
  cx += barW + 14;
  ctx.font = labelSize + 'px "Courier New", monospace';
  ctx.fillStyle = '#888';
  ctx.fillText('TECH DEBT', cx, row1);
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(cx, row2, barW, barH);
  const debtColor = techDebt < 40 ? '#444' : techDebt < 70 ? '#c80' : '#f00';
  ctx.fillStyle = debtColor;
  ctx.fillRect(cx, row2, barW * (techDebt / 100), barH);
  ctx.fillStyle = '#888';
  ctx.font = valSize + 'px "Courier New", monospace';
  ctx.fillText(techDebt + '%', cx, row3 + valSize);

  // Release progress
  cx += barW + 14;
  const p = getLevelParams();
  const relPct = Math.min(1, releaseProgress / p.actionsForRelease);
  ctx.font = labelSize + 'px "Courier New", monospace';
  ctx.fillStyle = '#888';
  ctx.fillText('RELEASE', cx, row1);
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(cx, row2, barW, barH);
  ctx.fillStyle = '#08f';
  ctx.fillRect(cx, row2, barW * relPct, barH);
  ctx.fillStyle = '#888';
  ctx.font = valSize + 'px "Courier New", monospace';
  ctx.fillText(Math.floor(relPct * 100) + '%', cx, row3 + valSize);

  // Version + score (right side)
  ctx.textAlign = 'right';
  ctx.font = 'bold ' + versionSize + 'px "Courier New", monospace';
  ctx.fillStyle = '#0ff';
  ctx.fillText('v' + version.join('.'), W - pad, row1 + 2);
  ctx.font = scoreSize + 'px "Courier New", monospace';
  ctx.fillStyle = '#666';
  ctx.fillText('SCORE ' + score, W - pad, row2 + barH);
  ctx.fillText('AGENTS ' + agents.filter(a => a.state !== 'dying').length, W - pad, row3 + valSize);

  // Low stability warning
  if (stability <= 30) {
    const flash = Math.sin(performance.now() / 200) > 0;
    if (flash) {
      ctx.fillStyle = 'rgba(255,0,0,0.06)';
      ctx.fillRect(0, 0, W, H);
    }
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life / 0.5);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function drawFloats() {
  for (const f of floats) {
    ctx.globalAlpha = Math.max(0, Math.min(1, f.life));
    ctx.font = 'bold ' + Math.round(11 * S) + 'px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

function drawTitle() {
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);
  drawCodeBg();

  const cx = W / 2, cy = H * 0.38;
  ctx.textAlign = 'center';

  // Title
  ctx.font = 'bold ' + Math.min(48, W * 0.08) + 'px "Courier New", monospace';
  ctx.fillStyle = '#0ff';
  ctx.shadowColor = '#0ff';
  ctx.shadowBlur = 20;
  ctx.fillText('AGENTIC CHAOS', cx, cy);
  ctx.shadowBlur = 0;

  // Subtitle
  ctx.font = '12px "Courier New", monospace';
  ctx.fillStyle = '#666';
  ctx.fillText('Wrangle rogue AI agents. Ship releases. Survive.', cx, cy + 30);

  // Instructions
  ctx.fillStyle = '#444';
  ctx.font = '10px "Courier New", monospace';
  ctx.fillText('Click rogue agents before they wreck your codebase', cx, cy + 60);
  ctx.fillText('Use Unit Tests, Specs, and Reviews to stay alive', cx, cy + 75);
  ctx.fillText('Each release ships a new version \u2014 how far can you go?', cx, cy + 90);

  // Blink
  titleBlink += 0.03;
  if (Math.sin(titleBlink) > 0) {
    ctx.font = 'bold 14px "Courier New", monospace';
    ctx.fillStyle = '#ff00ff';
    ctx.fillText('[ CLICK TO START ]', cx, cy + 130);
  }
}

function drawRelease() {
  const cx = W / 2, cy = H * 0.4;
  ctx.fillStyle = 'rgba(0,20,40,0.7)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.font = 'bold ' + Math.min(36, W * 0.06) + 'px "Courier New", monospace';
  ctx.fillStyle = '#0f0';
  ctx.shadowColor = '#0f0';
  ctx.shadowBlur = 20;
  ctx.fillText('RELEASE SHIPPED!', cx, cy);
  ctx.shadowBlur = 0;

  ctx.font = 'bold 24px "Courier New", monospace';
  ctx.fillStyle = '#0ff';
  ctx.fillText('v' + version.join('.'), cx, cy + 40);

  ctx.font = '11px "Courier New", monospace';
  ctx.fillStyle = '#888';
  ctx.fillText('Level ' + level + ' \u2014 agents getting faster...', cx, cy + 70);
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(10,0,0,0.85)';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2, cy = H * 0.32;
  ctx.textAlign = 'center';

  ctx.font = 'bold ' + Math.min(36, W * 0.06) + 'px "Courier New", monospace';
  ctx.fillStyle = '#f00';
  ctx.shadowColor = '#f00';
  ctx.shadowBlur = 15;
  ctx.fillText('CODE BASE COLLAPSE', cx, cy);
  ctx.shadowBlur = 0;

  ctx.font = '11px "Courier New", monospace';
  ctx.fillStyle = '#888';
  const stats = [
    'Final Version: v' + version.join('.'),
    'Releases Shipped: ' + releasesShipped,
    'Rogues Killed: ' + roguesKilled,
    'Score: ' + score,
    'Tech Debt at Death: ' + techDebt + '%',
  ];
  stats.forEach((s, i) => {
    ctx.fillText(s, cx, cy + 35 + i * 20);
  });

  titleBlink += 0.03;
  if (Math.sin(titleBlink) > 0) {
    ctx.font = 'bold 12px "Courier New", monospace';
    ctx.fillStyle = '#f80';
    ctx.fillText('[ CLICK TO TRY AGAIN ]', cx, cy + 35 + stats.length * 20 + 30);
  }
}

// =====================================================
// MAIN LOOP
// =====================================================
let lastTime = 0;

function frame(now) {
  requestAnimationFrame(frame);
  const dt = Math.min(0.1, (now - lastTime) / 1000);
  lastTime = now;

  if (state === 'title') {
    drawTitle();
    return;
  }

  if (state === 'gameover') {
    drawGameOver();
    return;
  }

  // Scroll code bg
  codeScroll += dt * 8;

  // Spawn agents
  const p = getLevelParams();
  spawnTimer -= dt;
  if (spawnTimer <= 0 && state === 'playing') {
    spawnAgent();
    spawnTimer = p.spawnInterval * (0.8 + Math.random() * 0.4);
  }

  // Update
  if (state === 'playing') {
    updateAgents(dt);
    updateCooldowns(dt);
    checkRelease();

    // Tech debt makes things worse — cascading failures
    if (techDebt > 35) {
      // Extra rogue chance from debt, scales hard
      const debtFactor = (techDebt - 35) / 65; // 0 to 1
      for (const a of agents) {
        if ((a.state === 'working' || a.state === 'idle') && Math.random() < 0.15 * debtFactor * dt) {
          a.state = 'unstable';
          a.unstableTimer = p.unstableTime * 0.6;
          sfxWarn();
        }
      }
    }

    // Game over check
    if (stability <= 0) {
      state = 'gameover';
      controls.classList.remove('visible');
      sfxGameOver();
      resize();
    }
  }

  if (state === 'releasing') {
    releaseTimer -= dt;
    updateParticles(dt);
    if (releaseTimer <= 0) {
      state = 'playing';
    }
  }

  updateParticles(dt);

  // Draw
  // Screen shake
  if (shakeMag > 0) {
    ctx.save();
    ctx.translate((Math.random() - 0.5) * shakeMag, (Math.random() - 0.5) * shakeMag);
    shakeMag *= 0.9;
    if (shakeMag < 0.3) shakeMag = 0;
  }

  drawCodeBg();

  // Slow effect tint
  if (slowTimer > 0) {
    ctx.fillStyle = 'rgba(0,100,255,0.03)';
    ctx.fillRect(0, 0, W, H);
  }

  // Sort agents by Y for depth
  const sorted = [...agents].sort((a, b) => a.y - b.y);
  for (const a of sorted) drawAgent(a);

  drawParticles();
  drawFloats();
  drawHUD();

  if (state === 'releasing') drawRelease();

  if (shakeMag > 0) ctx.restore();
}

requestAnimationFrame(frame);
</script>
